# ============================================================
# QUANTUM — Configuration Netlify
# Déploiement Next.js 15 via le runtime officiel Netlify
# ============================================================

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Runtime Next.js officiel — gère le SSR, l'ISR, les images
# et les redirections internes de Next.js automatiquement.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ------------------------------------------------------------
# Headers de sécurité globaux
# ------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ------------------------------------------------------------
# Cache long pour les assets statiques immuables
# ------------------------------------------------------------
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/models/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
